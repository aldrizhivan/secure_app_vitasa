rules:
  - id: python-flask-debug
    patterns:
      - pattern: app.run(..., debug=True)
    message: "Flask debug mode should not be enabled in production"
    severity: ERROR
    languages: [python]

  - id: insecure-random
    patterns:
      - pattern: random.random(...)
    message: "Use secrets module for cryptographic purposes"
    severity: WARNING
    languages: [python]
